<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REMPRO — Страница не найдена</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e0e7ff 100%);
    color: #1a1a1a; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px;
  }
  .logo {
    position: fixed; top: 20px; left: 32px;
    display: flex; align-items: center; gap: 10px;
    font-weight: 800; font-size: 20px;
  }
  .logo .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #1e40af);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px; font-weight: 700;
  }
  .error-container { text-align: center; max-width: 560px; }
  .error-code {
    font-size: 160px; font-weight: 800;
    background: linear-gradient(135deg, #3b82f6, #1e40af);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1; margin-bottom: 16px;
  }
  .error-title { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
  .error-text { font-size: 16px; color: #666; line-height: 1.6; margin-bottom: 32px; }
  .error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-primary {
    background: #3b82f6; color: #fff; border: none;
    padding: 14px 28px; border-radius: 10px; font-size: 15px;
    font-weight: 600; cursor: pointer; text-decoration: none;
  }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary {
    background: #fff; color: #3b82f6; border: 1px solid #3b82f6;
    padding: 14px 28px; border-radius: 10px; font-size: 15px;
    font-weight: 600; cursor: pointer; text-decoration: none;
  }
  .btn-secondary:hover { background: #eff6ff; }
  .search-box {
    margin-top: 32px; display: flex; gap: 8px; max-width: 400px; margin-left: auto; margin-right: auto;
  }
  .search-box input {
    flex: 1; padding: 12px 16px; border: 1px solid #ddd;
    border-radius: 10px; font-size: 14px; outline: none;
  }
  .search-box input:focus { border-color: #3b82f6; }
  .search-box button {
    background: #3b82f6; color: #fff; border: none;
    padding: 12px 20px; border-radius: 10px; cursor: pointer;
  }
</style>
</head>
<body>

<div class="logo">
  <div class="logo-icon">R</div>
  <span>REMPRO</span>
</div>

<div class="error-container">
  <div class="error-code">404</div>
  <div class="error-title">Страница не найдена</div>
  <div class="error-text">
    К сожалению, запрашиваемая страница не существует или была перемещена. 
    Проверьте правильность адреса или воспользуйтесь поиском.
  </div>
  <div class="error-actions">
    <a href="dashboard.html" class="btn-primary">На главную</a>
    <button class="btn-secondary" onclick="history.back()">← Назад</button>
  </div>
  <div class="search-box">
    <input type="text" placeholder="Поиск по сайту...">
    <button>🔍</button>
  </div>
</div>

</body>
</html>
