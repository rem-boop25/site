<!-- Стили для выпадающих меню (добавить в <style>) -->
<style>
  .header-actions {
    display: flex; align-items: center; gap: 16px;
  }
  .dropdown { position: relative; }
  .dropdown-menu {
    display: none; position: absolute; top: 100%; right: 0;
    background: #fff; border: 1px solid #e8e8e8; border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1); min-width: 220px;
    z-index: 1000; padding: 8px 0;
  }
  .dropdown:hover .dropdown-menu { display: block; }
  .dropdown-menu a {
    display: block; padding: 10px 16px; font-size: 14px;
    color: #333; text-decoration: none; white-space: nowrap;
  }
  .dropdown-menu a:hover { background: #f5f7fa; color: #3b82f6; }
  
  .profile-dropdown { position: relative; }
  .profile-menu {
    display: none; position: absolute; top: 100%; right: 0;
    background: #fff; border: 1px solid #e8e8e8; border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1); min-width: 200px;
    z-index: 1000; padding: 8px 0; margin-top: 8px;
  }
  .profile-menu.show { display: block; }
  .profile-menu a {
    display: block; padding: 10px 16px; font-size: 14px;
    color: #333; text-decoration: none;
  }
  .profile-menu a:hover { background: #f5f7fa; color: #3b82f6; }
  .profile-menu .divider {
    height: 1px; background: #e8e8e8; margin: 8px 0;
  }
  .profile-menu .logout { color: #ef4444; }
  .profile-menu .logout:hover { background: #fee2e2; color: #dc2626; }
  
  @media (max-width: 768px) {
    .header-actions { gap: 8px; }
    .dropdown-menu, .profile-menu {
      position: fixed; top: 70px; right: 20px;
    }
  }
</style>

<!-- Скрипт для закрытия меню при клике вне (добавить в <script>) -->
<script>
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.profile-dropdown')) {
      document.querySelectorAll('.profile-menu').forEach(m => m.classList.remove('show'));
    }
  });
</script>
